# Near-real-time media polling.
#
# Vercel Hobby crons are daily-only, so this GitHub Actions schedule drives the
# 10-minute poll instead (same pattern as the harvest/penzance dashboards).
# GitHub cron granularity is best-effort — expect ~10-20 minute effective
# cadence.
#
# Requires the repo secret CRON_SECRET (Settings → Secrets and variables →
# Actions) set to the same value as the Vercel CRON_SECRET env var. Until the
# secret exists the job exits cleanly instead of failing red.
name: Real-time media poll

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      include_social:
        description: "Also run the pay-per-result social actors (FB watchlist)"
        type: boolean
        default: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Hit the poll endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET repo secret is not set yet — skipping."
            echo "Add it under Settings → Secrets and variables → Actions,"
            echo "using the same value as the Vercel CRON_SECRET env var."
            exit 0
          fi
          SOCIAL_PARAM=""
          if [ "${{ inputs.include_social }}" = "true" ]; then
            SOCIAL_PARAM="?social=1"
          fi
          curl -fsS --max-time 90 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://66media.vercel.app/api/cron/poll$SOCIAL_PARAM"
